name: glyphet
description: "Cross-platform ebook reader with AI chatbot and notes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  uuid: ^4.5.1
  epubx: ^4.0.0
  pdfrx: ^1.0.94
  flutter_widget_from_html_core: ^0.15.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  archive: ^3.6.1
  xml: ^6.5.0
  html: ^0.15.5
  image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
